# Deploy to Hostinger
name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          coverage: none

      - name: Install PHP dependencies
        run: |
          composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --no-scripts --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies & Build
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          VITE_PUSHER_APP_KEY: ${{ secrets.VITE_PUSHER_APP_KEY }}
          VITE_PUSHER_APP_CLUSTER: ${{ secrets.VITE_PUSHER_APP_CLUSTER }}
          VITE_APP_PATH: "/forafix"

      - name: Clean up dev files before SCP
        run: |
          rm -rf node_modules .git
          # Note: Keeping vendor if you rely on it locally, but since post-deploy runs composer install, we could remove it too.
          # removing it to speed up the transfer significantly
          rm -rf vendor
          
      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          source: "."
          target: "/home/u157985566/domains/forahia.com/public_html/forafix"
          rm: false 
          strip_components: 0
          timeout: 10m

      - name: Execute Post-Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          timeout: 10m
          script: |
            cd /home/u157985566/domains/forahia.com/public_html/forafix
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan l5-swagger:generate
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
